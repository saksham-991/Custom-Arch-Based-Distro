name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH via ngrok
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install -y ngrok
          ngrok config add-authtoken $NGROK_TOKEN
          sudo useradd -m -s /bin/bash builduser
          echo "builduser:root" | sudo chpasswd
          sudo usermod -aG sudo builduser
          ngrok tcp 22 &
          sleep 5
          curl -s http://localhost:4040/api/tunnels | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          addr=d['tunnels'][0]['public_url'].replace('tcp://','')
          host,port=addr.split(':')
          print(f'SSH COMMAND: ssh builduser@{host} -p {port}')
          "
          sleep 360m
