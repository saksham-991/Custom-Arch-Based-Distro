name: Stable SSH Debugging
on: 
  workflow_dispatch:

jobs:
  ssh-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Ngrok & Start SSH
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          # 1. Set runner password
          echo "runneradmin:$SSH_PASSWORD" | sudo chpasswd
          
          # 2. Update and install dependencies
          sudo apt-get update && sudo apt-get install -y jq wget
          
          # 3. Fetch and install official ngrok binary
          wget -q https://bin.equinox.io/c/bgb9yd3nkws/ngrok-stable-linux-amd64.tgz
          tar -xzf ngrok-stable-linux-amd64.tgz
          chmod +x ./ngrok
          
          # 4. Configure and start Ngrok TCP tunnel
          ./ngrok config add-authtoken "$NGROK_AUTHTOKEN"
          ./ngrok tcp 22 --log=stdout > ngrok.log &
          
          # 5. Wait for initialization
          sleep 5
          
          # 6. Parse endpoint correctly (Fixed syntax)
          SSH_ENDPOINT=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          CLEAN_ENDPOINT=$(echo "$SSH_ENDPOINT" | sed 's/tcp:\/\///')
          HOST=$(echo "$CLEAN_ENDPOINT" | cut -d':' -f1)
          PORT=$(echo "$CLEAN_ENDPOINT" | cut -d':' -f2)
          
          echo "========================================================"
          echo " TERMUX CONNECTION COMMAND:"
          echo " ssh runneradmin@$HOST -p $PORT"
          echo "========================================================"

      - name: Keep Alive Loop
        run: |
          echo "To drop session manually: touch /tmp/continue"
          while [ ! -f /tmp/continue ]; do
            sleep 10
          done
