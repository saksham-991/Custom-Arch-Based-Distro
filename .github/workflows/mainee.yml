jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Connect to Tailscale
        uses: tailscale/tailscale-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          
      - name: Debug/Wait
        run: |
          # The runner is now reachable via its Tailscale IP
          # Use 'tailscale status' to find the IP
          # SSH directly into the runner using your local SSH key
          sleep 3600
